name: Update World Cup Schedule

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh
      - run: npm run check
      - name: Commit generated schedule
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update world cup schedule data"
          file_pattern: "data/matches.tsv data/reference-worldcup-2026.ics data/reference-schedule.json data/cctv-rankings.json data/cctv-scorers.json public/schedule.json public/world-cup-2026.ics public/calendars/*.ics"
